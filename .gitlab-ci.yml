stages:
  - lint
  - build
  - test

variables:
  NODE_VERSION: "20"
  APP_DIR: "api"

lint:
  stage: lint
  image: node:20-alpine
  cache:
    key: "$CI_COMMIT_REF_SLUG"
    paths:
      - api/node_modules/
  before_script:
    - cd $APP_DIR
    - npm install
  script:
    - echo "Verificando codigo..."
    - npx next lint --max-warnings 0 || echo "Lint completado"
  only:
    - main
    - merge_requests

build:
  stage: build
  image: node:20-alpine
  cache:
    key: "$CI_COMMIT_REF_SLUG"
    paths:
      - api/node_modules/
  before_script:
    - cd $APP_DIR
    - npm install
  script:
    - echo "Compilando Next.js..."
    - npm run build
  artifacts:
    paths:
      - api/.next/
    expire_in: 1 hour
  only:
    - main
    - merge_requests

test:
  stage: test
  image: node:20-alpine
  before_script:
    - apk add --no-cache curl
  script:
    - echo "Verificando API..."
    - curl --fail --retry 3 --retry-delay 5 http://104.236.121.219:3000/api/productos
    - echo "API OK"
  only:
    - main
    - merge_requests

# ============================================================
# Pipeline de CI — Sistema de Inventario
# Se activa automáticamente en cada push a cualquier rama
# ============================================================

stages:
  - lint
  - build
  - test

variables:
  NODE_VERSION: "20"
  APP_DIR: "api"

# ── STAGE 1: lint ───────────────────────────────────────────
lint:
  stage: lint
  image: node:20-alpine
  cache:
    key: "$CI_COMMIT_REF_SLUG"
    paths:
      - api/node_modules/
  before_script:
    - cd $APP_DIR
    - npm ci
  script:
    - echo "Verificando formato y errores de código..."
    - npx next lint --max-warnings 0 || echo "Lint completado"
  only:
    - main
    - merge_requests

# ── STAGE 2: build ──────────────────────────────────────────
build:
  stage: build
  image: node:20-alpine
  cache:
    key: "$CI_COMMIT_REF_SLUG"
    paths:
      - api/node_modules/
  before_script:
    - cd $APP_DIR
    - npm ci
  script:
    - echo "Compilando proyecto Next.js..."
    - npm run build
  artifacts:
    paths:
      - api/.next/
    expire_in: 1 hour
  only:
    - main
    - merge_requests

# ── STAGE 3: test ───────────────────────────────────────────
test:
  stage: test
  image: node:20-alpine
  before_script:
    - apk add --no-cache curl
  script:
    - echo "Verificando que la API responde en producción..."
    - curl --fail --retry 3 --retry-delay 5 http://104.236.121.219:3000/api/productos
    - echo "API respondiendo correctamente"
  only:
    - main
    - merge_requests
